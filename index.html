<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Crew Board</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020204" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crew Board" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Share+Tech+Mono&display=swap" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { min-height: 100%; background: #020204; }
      body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
      :root { --vc: #ff0066; }

      @keyframes fadeUp    { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
      @keyframes sheetUp   { from{transform:translateY(100%)} to{transform:translateY(0)} }
      @keyframes glitch    { 0%,87%,100%{text-shadow:none} 88%{text-shadow:-3px 0 var(--vc)} 89%{text-shadow:3px 0 #00ffaa,-1px 0 var(--vc)} 90%{text-shadow:none} }
      @keyframes recRing   { 0%,100%{box-shadow:0 0 0 0 var(--vc)} 50%{box-shadow:0 0 0 10px transparent} }
      @keyframes popIn     { from{opacity:0;transform:scale(.6)} to{opacity:1;transform:scale(1)} }
      @keyframes breathe   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.025)} }
      @keyframes dotPulse  { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.6} }
      @keyframes deleteOut { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(0.8) rotate(-3deg)} }
      @keyframes deleteIn  { 0%{opacity:0;transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
      @keyframes slideDown { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
      @keyframes drift0    { 0%{transform:translate(0,0)scale(1)} 100%{transform:translate(4vw,-3vh)scale(1.12)} }
      @keyframes drift1    { 0%{transform:translate(0,0)scale(1)} 100%{transform:translate(-3vw,5vh)scale(.9)} }
      @keyframes drift2    { 0%{transform:translate(0,0)scale(1)} 100%{transform:translate(3vw,3vh)scale(1.06)} }
      @keyframes drift3    { 0%{transform:translate(0,0)scale(1)} 100%{transform:translate(-4vw,-2vh)scale(.95)} }
      @keyframes drift4    { 0%{transform:translate(0,0)scale(1)} 100%{transform:translate(2vw,4vh)scale(1.09)} }
      @keyframes popoverIn { from{opacity:0;transform:translateX(-50%) scale(.85) translateY(-6px)} to{opacity:1;transform:translateX(-50%) scale(1) translateY(0)} }

      .mem-w    { animation: fadeUp .35s ease both; }
      .tg       { animation: glitch 9s infinite; }
      .sht      { animation: sheetUp .28s cubic-bezier(.2,.8,.3,1) both; }
      .rng      { animation: recRing 1.1s infinite; }
      .pop      { animation: popIn .2s ease both; }
      .pov      { animation: popoverIn .18s ease both; }
      .deleting { animation: deleteOut .4s ease forwards !important; pointer-events: none; }
      .install-banner { animation: slideDown .4s ease both; }

      textarea, input[type=text] {
        background: #0b0b14; border: 1px solid #1d1d28; color: #dde;
        font-family: 'Share Tech Mono', monospace; font-size: 13px;
        padding: 11px 12px; border-radius: 0; outline: none; width: 100%;
        transition: border-color .15s;
      }
      textarea:focus, input[type=text]:focus { border-color: var(--vc); }
      textarea { resize: vertical; }
      input[type=file] { display: none; }
      input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; background: transparent; outline: none; cursor: pointer; }
      input[type=range]::-webkit-slider-runnable-track { height: 3px; background: transparent; }
      ::-webkit-scrollbar { width: 2px; }
      ::-webkit-scrollbar-thumb { background: #1d1d28; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
